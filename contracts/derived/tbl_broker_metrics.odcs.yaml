name: Broker Metrics Aggregate
version: 1.0.0
id: urn:mqtt2postgres:tbl_broker_metrics
servers:
  - server: postgres-prod
    type: postgres
    host: localhost
    port: 5432
    database: mqtt
    schema: public
models:
  tbl_broker_metrics:
    type: table
    description: Trusted broker metrics staging table.
    fields:
      msg_date:
        type: timestamp
        required: true
      msg_topic:
        type: text
        required: true
      msg_value:
        type: text
        required: true
customProperties:
  sourceContractId: urn:mqtt:broker:raw
  sourceTopicFilters:
    - "$SYS/broker/messages/#"
