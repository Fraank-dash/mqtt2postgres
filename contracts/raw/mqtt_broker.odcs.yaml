name: MQTT Broker Raw
version: 1.0.0
id: urn:mqtt:broker:raw
servers:
  - server: mqtt-prod
    type: custom
    description: MQTT broker publishing raw metrics.
    environment: prod
    customProperties:
      protocol: mqtt
      host: localhost
      port: 1883
      qos: 0
      topicFilters:
        - "sensors/+/temp"
        - "$SYS/broker/clients/#"
        - "$SYS/broker/messages/#"
models:
  mqtt_message:
    type: object
    description: Raw MQTT message envelope.
    fields:
      topic:
        type: text
        required: true
      payload:
        type: text
        required: true
      received_at:
        type: timestamp
        required: tru
