name: MQTT Broker Raw
version: 1.0.0
id: urn:mqtt:broker:raw
servers:
  - server: mqtt-prod
    type: custom
    environment: local-docker
    customProperties:
      protocol: mqtt
      host: host.docker.internal
      port: 1883
      qos: 0
      topicFilters:
        - "sensors/+/temp"
        - "$SYS/broker/clients/#"
        - "$SYS/broker/messages/#"
models:
  mqtt_message:
    type: object
    fields:
      topic:
        type: text
      payload:
        type: text
      received_at:
        type: timestamp
