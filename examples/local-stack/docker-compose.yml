services:
  mqtt-publisher:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: mqtt2postgres:local
    container_name: mqtt2postgres-local-publisher
    environment:
      PYTHONUNBUFFERED: "1"
    entrypoint: ["sh", "-c"]
    command:
      - >
        sleep 5;
        exec python -m apps.publisher
        --config /config/publisher-config.json
    depends_on:
      mqtt-subscriber:
        condition: service_started
      mqtt-subscriber-topics:
        condition: service_started
    volumes:
      - ./publisher-config.json:/config/publisher-config.json:ro
    restart: unless-stopped

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: mqtt2postgres-local-broker
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        cp /mosquitto/config-src/mosquitto.conf /mosquitto/config/mosquitto.conf &&
        cp /mosquitto/config-src/passwords /mosquitto/config/passwords &&
        cp /mosquitto/config-src/aclfile /mosquitto/config/aclfile &&
        chown mosquitto:mosquitto /mosquitto/config/passwords /mosquitto/config/aclfile &&
        chmod 600 /mosquitto/config/passwords /mosquitto/config/aclfile &&
        exec mosquitto -c /mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    volumes:
      - /mnt/nvme/mqtt/mosquitto:/mosquitto/config-src:ro

  mqtt-subscriber:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: mqtt2postgres:local
    container_name: mqtt2postgres-local-subscriber
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      PYTHONUNBUFFERED: "1"
    command:
      - --config
      - /config/subscriber-config.json
    depends_on:
      mqtt-broker:
        condition: service_started
      timescaledb:
        condition: service_healthy
    volumes:
      - ./subscriber-config.json:/config/subscriber-config.json:ro
    restart: unless-stopped

  mqtt-subscriber-topics:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: mqtt2postgres:local
    container_name: mqtt2postgres-local-subscriber-topics
    environment:
      POSTGRES_USERNAME: postgres
      POSTGRES_PASSWORD: postgres
      PYTHONUNBUFFERED: "1"
    command:
      - --config
      - /config/subscriber-topics-config.json
    depends_on:
      mqtt-broker:
        condition: service_started
      timescaledb:
        condition: service_healthy
    volumes:
      - ./subscriber-topics-config.json:/config/subscriber-topics-config.json:ro
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb-ha:pg16
    container_name: mqtt2postgres-local-timescaledb
    environment:
      POSTGRES_DB: mqtt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d mqtt && psql -U postgres -d mqtt -Atc \"SELECT to_regclass('mqtt_ingest.messages') IS NOT NULL AND to_regclass('mqtt_ingest.message_3m_aggregates') IS NOT NULL AND to_regclass('mqtt_ingest.topic_overview') IS NOT NULL AND to_regprocedure('mqtt_ingest.ingest_message(text,text,timestamp with time zone,jsonb)') IS NOT NULL AND to_regprocedure('mqtt_ingest.ingest_topics(text,text,timestamp with time zone,jsonb)') IS NOT NULL\" | grep -q t",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ../sql/mqtt-ingest:/docker-entrypoint-initdb.d:ro
